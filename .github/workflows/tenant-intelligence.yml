name: Tenant Intelligence - Weekly Report

# Run every Monday at 8:00 AM Pacific Time
on:
  schedule:
    - cron: '0 16 * * 1'  # 16:00 UTC = 8:00 AM PT

jobs:
  tenant-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install anthropic
    
    - name: Run Tenant Intelligence Agent
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
      run: python tenant-news-agent.py
    
    - name: Commit updated history
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add reported_news.json
        git commit -m "Update reported news history - $(date)" || echo "No changes to commit"
        git push || echo "No changes to push"
